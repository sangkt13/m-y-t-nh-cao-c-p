      <!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>FX-900 Pro Max Multi-Graph</title><script src="https://cdn.tailwindcss.com"></script><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"><style>body{touch-action:manipulation;-webkit-tap-highlight-color:transparent}.btn-press:active{transform:scale(0.95)}.glass{background:rgba(255,255,255,0.9);backdrop-filter:blur(10px)}input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}::-webkit-scrollbar{width:0;height:0}.hide-scrollbar::-webkit-scrollbar{display:none}.hide-scrollbar{-ms-overflow-style:none;scrollbar-width:none}</style></head><body class="bg-white text-gray-900 h-screen flex flex-col font-sans overflow-hidden select-none"><!-- Header --><div class="flex w-full bg-gray-50 p-2 space-x-2 overflow-x-auto hide-scrollbar border-b border-gray-200 z-20"><button onclick="switchMode('calc')" id="tab-calc" class="flex-none px-6 py-3 text-sm font-bold rounded-full transition-all bg-blue-600 text-white shadow-md whitespace-nowrap">MÁY TÍNH</button><button onclick="switchMode('eq')" id="tab-eq" class="flex-none px-6 py-3 text-sm font-bold rounded-full transition-all bg-white text-gray-600 border border-gray-200 whitespace-nowrap">GIẢI PT</button><button onclick="switchMode('graph')" id="tab-graph" class="flex-none px-6 py-3 text-sm font-bold rounded-full transition-all bg-white text-gray-600 border border-gray-200 whitespace-nowrap">ĐỒ THỊ</button></div><!-- VIEW: CALCULATOR --><div id="view-calc" class="flex flex-col flex-1 h-full"><div class="bg-gray-50 flex-none flex flex-col justify-end items-end p-6 border-b border-gray-200"><div id="history" class="text-gray-400 text-lg mb-1 h-6 font-medium text-right w-full overflow-hidden"></div><div id="display" class="text-5xl font-bold text-gray-900 break-all leading-tight text-right">0</div><div id="fraction-display" class="text-blue-600 text-xl font-medium mt-2 h-6 text-right"></div></div><div class="flex-1 bg-white p-4 grid grid-cols-4 gap-3 content-end"><button onclick="clearDisplay()" class="btn-press bg-red-50 text-red-600 rounded-2xl h-14 text-lg font-bold">AC</button><button onclick="deleteChar()" class="btn-press bg-red-50 text-red-600 rounded-2xl h-14 text-lg font-bold"><i class="fas fa-backspace"></i></button><button onclick="insertFunc('^')" class="btn-press bg-blue-50 text-blue-600 rounded-2xl h-14 text-lg font-bold">x^y</button><button onclick="appendOperator('/')" class="btn-press bg-blue-50 text-blue-600 rounded-2xl h-14 text-lg font-bold">÷</button><button onclick="insertFunc('sin(')" class="btn-press bg-gray-100 text-gray-700 rounded-2xl h-14 text-sm font-bold">sin</button><button onclick="insertFunc('cos(')" class="btn-press bg-gray-100 text-gray-700 rounded-2xl h-14 text-sm font-bold">cos</button><button onclick="insertFunc('tan(')" class="btn-press bg-gray-100 text-gray-700 rounded-2xl h-14 text-sm font-bold">tan</button><button onclick="appendOperator('*')" class="btn-press bg-blue-50 text-blue-600 rounded-2xl h-14 text-lg font-bold">×</button><button onclick="appendNumber('7')" class="btn-press bg-white border border-gray-200 text-gray-900 rounded-2xl h-14 text-2xl font-medium shadow-sm">7</button><button onclick="appendNumber('8')" class="btn-press bg-white border border-gray-200 text-gray-900 rounded-2xl h-14 text-2xl font-medium shadow-sm">8</button><button onclick="appendNumber('9')" class="btn-press bg-white border border-gray-200 text-gray-900 rounded-2xl h-14 text-2xl font-medium shadow-sm">9</button><button onclick="appendOperator('-')" class="btn-press bg-blue-50 text-blue-600 rounded-2xl h-14 text-lg font-bold">-</button><button onclick="appendNumber('4')" class="btn-press bg-white border border-gray-200 text-gray-900 rounded-2xl h-14 text-2xl font-medium shadow-sm">4</button><button onclick="appendNumber('5')" class="btn-press bg-white border border-gray-200 text-gray-900 rounded-2xl h-14 text-2xl font-medium shadow-sm">5</button><button onclick="appendNumber('6')" class="btn-press bg-white border border-gray-200 text-gray-900 rounded-2xl h-14 text-2xl font-medium shadow-sm">6</button><button onclick="appendOperator('+')" class="btn-press bg-blue-50 text-blue-600 rounded-2xl h-14 text-lg font-bold">+</button><button onclick="appendNumber('1')" class="btn-press bg-white border border-gray-200 text-gray-900 rounded-2xl h-14 text-2xl font-medium shadow-sm">1</button><button onclick="appendNumber('2')" class="btn-press bg-white border border-gray-200 text-gray-900 rounded-2xl h-14 text-2xl font-medium shadow-sm">2</button><button onclick="appendNumber('3')" class="btn-press bg-white border border-gray-200 text-gray-900 rounded-2xl h-14 text-2xl font-medium shadow-sm">3</button><button onclick="calculate()" class="btn-press row-span-2 bg-blue-600 text-white rounded-2xl text-2xl font-bold shadow-lg flex items-center justify-center">=</button><button onclick="appendNumber('0')" class="btn-press col-span-2 bg-white border border-gray-200 text-gray-900 rounded-2xl h-14 text-2xl font-medium shadow-sm">0</button><button onclick="appendNumber('.')" class="btn-press bg-white border border-gray-200 text-gray-900 rounded-2xl h-14 text-2xl font-bold shadow-sm">.</button></div></div><!-- VIEW: EQUATION SOLVER --><div id="view-eq" class="hidden flex-col flex-1 h-full bg-white overflow-y-auto"><div class="p-4 sticky top-0 bg-white z-10 border-b border-gray-100"><select id="eq-type" onchange="updateEqInputs()" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl font-bold text-gray-700 outline-none h-14 text-lg"><option value="2">Phương Trình Bậc 2 (Ax²...)</option><option value="3">Phương Trình Bậc 3 (Ax³...)</option><option value="4">Phương Trình Bậc 4 (Ax⁴...)</option></select></div><div class="p-6 space-y-4"><div id="eq-formula" class="text-center font-mono text-blue-600 bg-blue-50 p-4 rounded-xl border border-blue-100 text-lg font-bold"></div><div id="eq-inputs" class="space-y-3"></div><button onclick="solveCurrentEquation()" class="btn-press w-full bg-blue-600 text-white font-bold py-4 rounded-xl text-xl shadow-lg mt-4">GIẢI NGHIỆM</button><div id="eq-result" class="hidden mt-6 p-4 bg-gray-50 rounded-xl border border-gray-200 animate-fade-in"><h3 class="text-gray-500 font-bold mb-2 uppercase text-xs">Kết quả:</h3><div id="eq-result-content" class="text-lg font-bold text-gray-800 space-y-2"></div></div></div></div><!-- VIEW: GRAPH & DERIVATIVE --><div id="view-graph" class="hidden flex-col flex-1 h-full bg-white overflow-y-auto"><div class="p-4 space-y-4"><div class="flex justify-between items-center"><h3 class="text-lg font-bold text-gray-800">Danh sách hàm số</h3><button onclick="addGraphInput()" class="bg-green-100 text-green-700 px-3 py-1 rounded-lg text-sm font-bold btn-press"><i class="fas fa-plus mr-1"></i>Thêm</button></div><div id="func-list" class="space-y-3"><!-- Inputs added via JS --></div><div class="flex space-x-2"><button onclick="drawGraph()" class="btn-press flex-1 bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-md h-14">VẼ TẤT CẢ</button><button onclick="toggleDeriv()" class="btn-press flex-1 bg-teal-600 text-white font-bold py-3 rounded-xl shadow-md h-14">ĐẠO HÀM</button></div><div id="deriv-panel" class="hidden bg-teal-50 p-4 rounded-xl border border-teal-100 space-y-3"><div class="text-xs text-teal-600 font-bold uppercase mb-1">Tính đạo hàm (Hàm đầu tiên)</div><div class="flex items-center space-x-2"><label class="font-bold text-teal-800">Tại x =</label><input type="number" id="deriv-x" value="1" class="w-24 p-3 bg-white rounded-lg border border-teal-200 outline-none text-center font-bold text-lg"></div><div class="flex justify-between items-center"><span class="text-sm text-teal-700">Kết quả f'(x):</span><span id="deriv-res" class="text-2xl font-bold text-teal-900">--</span></div><button onclick="calculateDerivative()" class="w-full py-3 bg-teal-200 text-teal-800 font-bold rounded-lg hover:bg-teal-300">Tính ngay</button></div><div class="relative w-full aspect-square bg-white border border-gray-200 rounded-xl shadow-inner overflow-hidden mb-20"><canvas id="graphCanvas" class="w-full h-full"></canvas><div class="absolute bottom-2 right-2 text-xs text-gray-400 bg-white/90 px-2 rounded pointer-events-none">Chạm để zoom/pan (WIP)</div><div class="absolute top-2 left-2 flex flex-col space-y-1" id="legend-container"></div></div></div></div><script>let currentInput='0';let isResult=false;const display=document.getElementById('display');const historyDisplay=document.getElementById('history');const fractionDisplay=document.getElementById('fraction-display');const canvas=document.getElementById('graphCanvas');const ctx=canvas.getContext('2d');let graphScale=40;let graphOffsetX=0;let graphOffsetY=0;const colors=['#2563eb','#dc2626','#16a34a','#d97706','#9333ea','#0891b2'];function switchMode(mode){document.querySelectorAll('[id^="view-"]').forEach(el=>el.classList.add('hidden'));document.querySelectorAll('[id^="view-"]').forEach(el=>el.classList.remove('flex'));document.getElementById('view-'+mode).classList.remove('hidden');document.getElementById('view-'+mode).classList.add('flex');document.querySelectorAll('[id^="tab-"]').forEach(el=>{el.classList.remove('bg-blue-600','text-white');el.classList.add('bg-white','text-gray-600')});const activeTab=document.getElementById('tab-'+mode);activeTab.classList.remove('bg-white','text-gray-600');activeTab.classList.add('bg-blue-600','text-white');if(mode==='eq') updateEqInputs();if(mode==='graph'){if(document.querySelectorAll('.func-row').length===0) addGraphInput('x^2');resizeCanvas();drawGraph()}}/* --- CALC LOGIC --- */function updateDisplay(){display.innerText=currentInput;display.style.fontSize=currentInput.length>10?'2rem':'3rem'}function appendNumber(num){if(currentInput==='0'||isResult){currentInput=num;isResult=false;fractionDisplay.innerText=''}else{currentInput+=num}updateDisplay()}function appendOperator(op){isResult=false;const last=currentInput.slice(-1);if(['+','-','*','/','^'].includes(last))currentInput=currentInput.slice(0,-1)+op;else currentInput+=op;updateDisplay()}function insertFunc(func){if(currentInput==='0'||isResult){currentInput=func;isResult=false}else{currentInput+=func}updateDisplay()}function clearDisplay(){currentInput='0';historyDisplay.innerText='';fractionDisplay.innerText='';isResult=false;updateDisplay()}function deleteChar(){if(isResult){clearDisplay();return}currentInput=currentInput.toString().slice(0,-1)||'0';updateDisplay()}function getFraction(decimal){if(!isFinite(decimal)||Number.isInteger(decimal))return'';const len=decimal.toString().length-2;const den=Math.pow(10,len);const num=Math.round(decimal*den);const gcd=(a,b)=>b?gcd(b,a%b):a;const common=gcd(num,den);if(den/common>10000)return'';return(num/common)+'/'+(den/common)}function calculate(){try{historyDisplay.innerText=currentInput.replace(/\*/g,'×').replace(/\//g,'÷');let expr=currentInput.replace(/\^/g,'**').replace(/sin/g,'Math.sin').replace(/cos/g,'Math.cos').replace(/tan/g,'Math.tan');let res=eval(expr);if(!isFinite(res)||isNaN(res)){currentInput='Error'}else{let final=parseFloat(res.toFixed(10));currentInput=final.toString();fractionDisplay.innerText=getFraction(final)}isResult=true;updateDisplay()}catch(e){currentInput='Error';isResult=true;updateDisplay()}}/* --- EQUATION SOLVER LOGIC --- */function updateEqInputs(){const type=document.getElementById('eq-type').value;const container=document.getElementById('eq-inputs');const formula=document.getElementById('eq-formula');container.innerHTML='';document.getElementById('eq-result').classList.add('hidden');const chars=['A','B','C','D','E'];const formulas={2:'Ax² + Bx + C = 0',3:'Ax³ + Bx² + Cx + D = 0',4:'Ax⁴ + Bx³ + Cx² + Dx + E = 0'};formula.innerText=formulas[type];const count=parseInt(type)+1;for(let i=0;i<count;i++){container.innerHTML+=`<div class="flex items-center bg-gray-50 rounded-xl px-3 border border-gray-200 h-14"><label class="w-8 font-bold text-gray-500 text-lg">${chars[i]}=</label><input type="number" id="coeff-${i}" class="flex-1 bg-transparent outline-none font-bold text-gray-800 text-xl" placeholder="0"></div>`}}function solveCurrentEquation(){const type=parseInt(document.getElementById('eq-type').value);const coeffs=[];for(let i=0;i<=type;i++){coeffs.push(parseFloat(document.getElementById(`coeff-${i}`).value)||0)}const resBox=document.getElementById('eq-result');const resContent=document.getElementById('eq-result-content');resBox.classList.remove('hidden');if(coeffs[0]===0){resContent.innerHTML='<div class="text-red-500">Hệ số A phải khác 0</div>';return}let roots=[];if(type===2) roots=solveQuad(coeffs[0],coeffs[1],coeffs[2]);else if(type===3) roots=solveCubic(coeffs[0],coeffs[1],coeffs[2],coeffs[3]);else if(type===4) roots=solveQuartic(coeffs[0],coeffs[1],coeffs[2],coeffs[3],coeffs[4]);resContent.innerHTML=roots.length?roots.map((x,i)=>`<div>x<sub>${i+1}</sub> = <span class="text-blue-600">${formatNum(x)}</span></div>`).join(''):'<div class="text-orange-500">Vô nghiệm thực</div>'}function formatNum(n){return Number.isInteger(n)?n:n.toFixed(5).replace(/\.?0+$/,'')}function solveQuad(a,b,c){const delta=b*b-4*a*c;if(delta<0)return[];if(delta===0)return[-b/(2*a)];return[(-b+Math.sqrt(delta))/(2*a),(-b-Math.sqrt(delta))/(2*a)]}function solveCubic(a,b,c,d){if(Math.abs(a)<1e-8)return solveQuad(b,c,d);b/=a;c/=a;d/=a;let q=(3*c-b*b)/9;let r=(9*b*c-27*d-2*b*b*b)/54;let d2=q*q*q+r*r;let roots=[];if(d2>=0){let s=Math.cbrt(r+Math.sqrt(d2));let t=Math.cbrt(r-Math.sqrt(d2));roots.push(s+t-b/3)}else{let theta=Math.acos(r/Math.sqrt(-q*q*q));roots.push(2*Math.sqrt(-q)*Math.cos(theta/3)-b/3);roots.push(2*Math.sqrt(-q)*Math.cos((theta+2*Math.PI)/3)-b/3);roots.push(2*Math.sqrt(-q)*Math.cos((theta+4*Math.PI)/3)-b/3)}return roots.sort((x,y)=>x-y)}function solveQuartic(a,b,c,d,e){if(Math.abs(a)<1e-8)return solveCubic(b,c,d,e);let res=[];const f=x=>a*x**4+b*x**3+c*x**2+d*x+e;const df=x=>4*a*x**3+3*b*x**2+2*c*x+d;for(let i=-50;i<=50;i+=0.5){let x=i;for(let j=0;j<10;j++){let y=f(x),dy=df(x);if(Math.abs(dy)<1e-6)break;x-=y/dy}if(Math.abs(f(x))<1e-5){if(!res.some(r=>Math.abs(r-x)<0.001)) res.push(x)}}return res.sort((x,y)=>x-y)}/* --- GRAPH & DERIVATIVE --- */function resizeCanvas(){canvas.width=canvas.clientWidth;canvas.height=canvas.clientWidth}window.addEventListener('resize',resizeCanvas);function addGraphInput(val=''){const list=document.getElementById('func-list');const idx=list.children.length;const color=colors[idx%colors.length];const div=document.createElement('div');div.className='flex items-center space-x-2 func-row animate-fade-in';div.innerHTML=`<div class="w-4 h-4 rounded-full flex-none" style="background:${color}"></div><div class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-3 flex items-center h-14 focus-within:ring-2 ring-blue-100 transition-all"><span class="text-gray-400 font-serif italic mr-1">f(x)=</span><input type="text" value="${val}" class="func-input flex-1 bg-transparent font-mono text-lg outline-none w-full text-gray-800 font-bold" placeholder="x^2"></div><button onclick="removeFunc(this)" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-red-500 transition-colors"><i class="fas fa-times"></i></button>`;list.appendChild(div)}function removeFunc(btn){const list=document.getElementById('func-list');if(list.children.length>1){btn.parentElement.remove();updateGraphColors()}}function updateGraphColors(){const rows=document.querySelectorAll('.func-row');rows.forEach((row,i)=>{row.querySelector('div:first-child').style.background=colors[i%colors.length]})}function evalMath(expr,x){try{return eval(expr.replace(/\^/g,'**').replace(/x/g,`(${x})`).replace(/sin/g,'Math.sin').replace(/cos/g,'Math.cos').replace(/tan/g,'Math.tan').replace(/log/g,'Math.log').replace(/sqrt/g,'Math.sqrt'))}catch(e){return NaN}}function drawGraph(){const inputs=document.querySelectorAll('.func-input');const w=canvas.width,h=canvas.height;ctx.clearRect(0,0,w,h);ctx.beginPath();ctx.strokeStyle='#e5e7eb';ctx.lineWidth=1;for(let i=0;i<=w;i+=graphScale) ctx.moveTo(i+graphOffsetX%graphScale,0),ctx.lineTo(i+graphOffsetX%graphScale,h);for(let i=0;i<=h;i+=graphScale) ctx.moveTo(0,i+graphOffsetY%graphScale),ctx.lineTo(w,i+graphOffsetY%graphScale);ctx.stroke();ctx.beginPath();ctx.strokeStyle='#374151';ctx.lineWidth=2;ctx.moveTo(w/2,0);ctx.lineTo(w/2,h);ctx.moveTo(0,h/2);ctx.lineTo(w,h/2);ctx.stroke();inputs.forEach((input,idx)=>{const expr=input.value.trim();if(!expr)return;const color=colors[idx%colors.length];ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=3;let started=false;for(let px=0;px<w;px++){let x=(px-w/2)/graphScale;let y=evalMath(expr,x);let py=h/2-y*graphScale;if(isNaN(y)){started=false;continue}if(py>=-h*2&&py<=2*h){if(!started) ctx.moveTo(px,py),started=true;else ctx.lineTo(px,py)}else{started=false}}ctx.stroke()})}function toggleDeriv(){document.getElementById('deriv-panel').classList.toggle('hidden')}function calculateDerivative(){const inputs=document.querySelectorAll('.func-input');if(!inputs.length)return;const expr=inputs[0].value;const xVal=parseFloat(document.getElementById('deriv-x').value);const h=0.0001;const f_x_h=evalMath(expr,xVal+h);const f_x=evalMath(expr,xVal);const res=(f_x_h-f_x)/h;document.getElementById('deriv-res').innerText=res.toFixed(4)}</script></body></html>
    </div>

          navigator.serviceWorker.register('sw.js');
